version: 0.1
created_at: 2026-06-25
purpose: >
  Planned acquisition batches for controlled source-city runs. The current
  CLI writes run manifests for single runs; this file defines the batch jobs
  a future batch runner should execute.

source_policy:
  core_dataset: trusted_evaluated_inventory_only
  include:
    - spinny
    - mahindra_first_choice
    - true_value
    - honda_auto_terrace
    - hyundai_promise
    - toyota_u_trust
  exclude_from_core_model_training:
    - olx
    - quikr
    - facebook_marketplace
    - unverified_customer_listed_marketplaces
  notes: >
    Core model data should come from platform, dealer, or OEM evaluated inventory,
    where pricing and condition are reviewed by the platform/dealer rather than
    directly self-reported by individual customers.

defaults:
  source: spinny
  max_pages: 3
  max_records: 60
  min_records: 60
  detail_pages: 60
  capture_attempts: 4
  retry_delay_ms: 2000
  page_scroll_delay_ms: 5000
  timeout_ms: 60000
  detail_attempts: 2
  detail_delay_ms: 3000

batches:
