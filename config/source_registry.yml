    display_name: CarDekho
    source_type: marketplace
    base_url: https://www.cardekho.com
    city_url: https://www.cardekho.com/used-cars+in+hyderabad
    first_adapter_priority: 8
    recommended_role: filtered_marketplace_source
    requires_js_rendering: true
    pagination_type: paginated_or_dynamic_listing
    visible_core_fields:
