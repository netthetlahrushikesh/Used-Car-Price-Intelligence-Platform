version: 0.1
created_at: 2026-06-24
default_city: Hyderabad
purpose: >
  Source registry for used-car acquisition planning. This file records source
  URLs, visible fields, missing fields, extraction risk, and first-adapter
  priority before scraper code is written.

field_tiers:
  core_required:
    - source
    - source_listing_id_or_listing_url
    - captured_at
    - city
    - brand
    - model
    - model_year
    - listed_price_inr
    - km_driven
    - fuel_type
    - transmission
    - raw_record_hash
    - ingestion_run_id
  high_value:
    - variant
    - ownership
    - registration_code
    - locality
    - seller_type
    - is_certified
    - is_available
  enrichment:
    - emi_amount_inr
    - original_price_inr
    - discount_amount_inr
    - deal_rating
    - inspection_status
    - inspection_score
    - warranty_label
    - return_policy_label
    - finance_label
    - hub_name
    - dealer_name
    - listing_posted_at
    - body_type
    - color
    - seating_capacity
    - image_url_count
    - source_quality_tags

source_types:
  marketplace: Multi-brand used-car marketplace.
  classified: Classified listing platform with mixed private and dealer stock.
  oem_certified: Manufacturer-backed certified used-car program.
  dealer_certified: Dealer or certification-led used-car platform.
  auction_wholesale: Auction, dealer, or wholesale-oriented source.

sources:
  - name: spinny
    display_name: Spinny
    source_type: marketplace
    base_url: https://www.spinny.com
    city_url: https://www.spinny.com/used-cars-in-hyderabad/s/
    first_adapter_priority: 1
    recommended_role: first_verified_source
    requires_js_rendering: true
    pagination_type: infinite_scroll_or_dynamic_listing
    visible_core_fields:
      - listed_price_inr
      - model_year
      - brand
      - model
      - variant
      - km_driven
      - fuel_type
      - transmission
      - registration_code
      - locality
    visible_high_value_fields:
      - is_certified
      - hub_name
      - finance_label
    likely_missing_fields:
      - ownership
      - seller_type
    known_data_risks:
      - km_values_may_use_k_suffix
      - variant_contains_trim_engine_and_gearbox_text
      - owner_count_not_obvious_on_listing_cards
    notes: Preferred first candidate because listing cards expose most pricing-critical fields and the platform positions inventory as inspected/assured.

